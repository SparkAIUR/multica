name: Docker Publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      backend_ref: ${{ steps.refs.outputs.backend_ref }}
      web_ref: ${{ steps.refs.outputs.web_ref }}
    env:
      REGISTRY_HOST: ${{ vars.REGISTRY_HOST }}
      REGISTRY_NAMESPACE: ${{ vars.REGISTRY_NAMESPACE }}
    steps:
      - name: Validate registry configuration
        run: |
          set -euo pipefail
          test -n "${REGISTRY_HOST}" || (echo "REGISTRY_HOST variable is required" && exit 1)
          test -n "${REGISTRY_NAMESPACE}" || (echo "REGISTRY_NAMESPACE variable is required" && exit 1)

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_HOST }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Compute image refs
        id: refs
        run: |
          set -euo pipefail
          short_sha="${GITHUB_SHA::7}"
          backend_base="${REGISTRY_HOST}/${REGISTRY_NAMESPACE}/multica-backend"
          web_base="${REGISTRY_HOST}/${REGISTRY_NAMESPACE}/multica-web"
          echo "short_sha=${short_sha}" >> "$GITHUB_OUTPUT"
          echo "backend_ref=${backend_base}:sha-${short_sha}" >> "$GITHUB_OUTPUT"
          echo "web_ref=${web_base}:sha-${short_sha}" >> "$GITHUB_OUTPUT"

      - name: Docker metadata (backend)
        id: backend_meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY_HOST }}/${{ env.REGISTRY_NAMESPACE }}/multica-backend
          tags: |
            type=raw,value=sha-${{ steps.refs.outputs.short_sha }}
            type=raw,value=${{ github.ref_name }},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') && !contains(github.ref_name, '-') }}

      - name: Docker metadata (web)
        id: web_meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY_HOST }}/${{ env.REGISTRY_NAMESPACE }}/multica-web
          tags: |
            type=raw,value=sha-${{ steps.refs.outputs.short_sha }}
            type=raw,value=${{ github.ref_name }},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') && !contains(github.ref_name, '-') }}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.backend_meta.outputs.tags }}
          labels: ${{ steps.backend_meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.ref_name }}
            COMMIT=${{ github.sha }}

      - name: Build and push web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.web
          push: true
          tags: ${{ steps.web_meta.outputs.tags }}
          labels: ${{ steps.web_meta.outputs.labels }}
          build-args: |
            REMOTE_API_URL=http://backend:8080
            NEXT_PUBLIC_KEYCLOAK_ISSUER_URL=${{ vars.NEXT_PUBLIC_KEYCLOAK_ISSUER_URL }}
            NEXT_PUBLIC_KEYCLOAK_CLIENT_ID=${{ vars.NEXT_PUBLIC_KEYCLOAK_CLIENT_ID }}
            NEXT_PUBLIC_KEYCLOAK_AUTH_URL=${{ vars.NEXT_PUBLIC_KEYCLOAK_AUTH_URL }}
            NEXT_PUBLIC_WS_URL=${{ vars.NEXT_PUBLIC_WS_URL }}

  smoke:
    runs-on: ubuntu-latest
    needs: build-and-push
    env:
      REGISTRY_HOST: ${{ vars.REGISTRY_HOST }}
    steps:
      - name: Login to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_HOST }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Pull published images
        run: |
          set -euo pipefail
          docker pull "${{ needs.build-and-push.outputs.backend_ref }}"
          docker pull "${{ needs.build-and-push.outputs.web_ref }}"

      - name: Backend health smoke
        run: |
          set -euo pipefail
          docker network create multica-smoke
          docker run -d --name smoke-postgres --network multica-smoke \
            -e POSTGRES_DB=multica \
            -e POSTGRES_USER=multica \
            -e POSTGRES_PASSWORD=multica \
            pgvector/pgvector:pg17

          docker run -d --name smoke-backend --network multica-smoke -p 18080:8080 \
            -e DATABASE_URL=postgres://multica:multica@smoke-postgres:5432/multica?sslmode=disable \
            -e JWT_SECRET=smoke-secret \
            -e FRONTEND_ORIGIN=http://localhost:13000 \
            "${{ needs.build-and-push.outputs.backend_ref }}"

          for _ in {1..40}; do
            if curl -fsS http://localhost:18080/health >/dev/null; then
              exit 0
            fi
            sleep 2
          done

          echo "backend /health check failed" >&2
          docker logs smoke-backend || true
          exit 1

      - name: Web startup smoke
        run: |
          set -euo pipefail
          docker run -d --name smoke-web -p 13000:3000 "${{ needs.build-and-push.outputs.web_ref }}"
          for _ in {1..30}; do
            if curl -fsS http://localhost:13000 >/dev/null; then
              exit 0
            fi
            sleep 2
          done

          echo "web startup check failed" >&2
          docker logs smoke-web || true
          exit 1

      - name: Cleanup
        if: always()
        run: |
          docker rm -f smoke-web smoke-backend smoke-postgres >/dev/null 2>&1 || true
          docker network rm multica-smoke >/dev/null 2>&1 || true
