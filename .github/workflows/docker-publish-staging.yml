name: Docker Publish - Staging

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-push-staging:
    runs-on: ubuntu-latest
    outputs:
      dockerhub_backend_ref: ${{ steps.refs.outputs.dockerhub_backend_ref }}
      dockerhub_web_ref: ${{ steps.refs.outputs.dockerhub_web_ref }}
      nudev_backend_ref: ${{ steps.refs.outputs.nudev_backend_ref }}
      nudev_web_ref: ${{ steps.refs.outputs.nudev_web_ref }}
    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Login to NuDev registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY_URL }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Compute image refs
        id: refs
        run: |
          set -euo pipefail
          short_sha="${GITHUB_SHA::7}"

          dockerhub_backend_base="nudevco/multica-backend"
          dockerhub_web_base="nudevco/multica-web"
          nudev_backend_base="hub.nu-dev.io/multica/backend"
          nudev_web_base="hub.nu-dev.io/multica/web"

          backend_tags=(
            "${dockerhub_backend_base}:sha-${short_sha}"
            "${nudev_backend_base}:sha-${short_sha}"
          )
          web_tags=(
            "${dockerhub_web_base}:sha-${short_sha}"
            "${nudev_web_base}:sha-${short_sha}"
          )

          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            backend_tags+=(
              "${dockerhub_backend_base}:${GITHUB_REF_NAME}"
              "${nudev_backend_base}:${GITHUB_REF_NAME}"
            )
            web_tags+=(
              "${dockerhub_web_base}:${GITHUB_REF_NAME}"
              "${nudev_web_base}:${GITHUB_REF_NAME}"
            )

            # Publish latest only for stable tags (e.g. v1.2.3, not v1.2.3-rc1).
            if [[ "${GITHUB_REF_NAME}" != *-* ]]; then
              backend_tags+=(
                "${dockerhub_backend_base}:staging"
                "${nudev_backend_base}:staging"
              )
              web_tags+=(
                "${dockerhub_web_base}:staging"
                "${nudev_web_base}:staging"
              )
            fi
          fi

          {
            echo "backend_tags<<EOF"
            printf '%s\n' "${backend_tags[@]}"
            echo "EOF"
            echo "web_tags<<EOF"
            printf '%s\n' "${web_tags[@]}"
            echo "EOF"
            echo "dockerhub_backend_ref=${dockerhub_backend_base}:sha-${short_sha}"
            echo "dockerhub_web_ref=${dockerhub_web_base}:sha-${short_sha}"
            echo "nudev_backend_ref=${nudev_backend_base}:sha-${short_sha}"
            echo "nudev_web_ref=${nudev_web_base}:sha-${short_sha}"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.refs.outputs.backend_tags }}
          build-args: |
            VERSION=${{ github.ref_name }}
            COMMIT=${{ github.sha }}

      - name: Build and push web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.web
          push: true
          tags: ${{ steps.refs.outputs.web_tags }}
          # REMOTE_API_URL=http://backend:8080
          build-args: |
            REMOTE_API_URL=${{ secrets.STAGING_REMOTE_API_URL }}
            NEXT_PUBLIC_KEYCLOAK_ISSUER_URL=${{ secrets.NEXT_PUBLIC_KEYCLOAK_ISSUER_URL }}
            NEXT_PUBLIC_KEYCLOAK_CLIENT_ID=${{ secrets.NEXT_PUBLIC_KEYCLOAK_CLIENT_ID }}
            NEXT_PUBLIC_KEYCLOAK_AUTH_URL=${{ secrets.NEXT_PUBLIC_KEYCLOAK_AUTH_URL }}
            NEXT_PUBLIC_WS_URL=${{ secrets.NEXT_PUBLIC_STAGING_WS_URL }}
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_STAGING_API_URL }}

      - name: Deploy to Coolify - Staging
        run: |
          curl --request GET '${{ secrets.COOLIFY_WEBHOOK }}' --header 'Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}'

